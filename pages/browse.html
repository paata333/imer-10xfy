<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse All</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
    <section class="browse">
        <div class="top-bar">
            <div class="search-box">
                <input type="text" placeholder="What do you want to play?" />
                <span class="search-icon"><img src="/assets/images/search-icon.png" alt=""></span>
            </div>

            <button class="camera-btn">
                <img src="/assets/images/camera-icon.png" alt="Camera">
            </button>
        </div>
        <div class="browse__header">
            <h1>Browse all</h1>
            <p>Discover</p>
        </div>

        <div class="browse__row">
            <div class="card blue">
                <h2>Made For<br />You</h2>
                <img src="/assets/images/made-for-you-img.png" alt="Cover" class="card-image" />
            </div>

            <div class="card orange">
                <h2>New<br />Releases</h2>
                <img src="/assets/images/new-release-img.png" alt="Cover" class="card-image" />
            </div>

            <div class="card green">
                <h2>Spotify<br />Classics</h2>
                <img src="/assets/images/spotify-classic-img.png" alt="Cover" class="card-image" />
            </div>

            <div class="card purple">
                <h2>Charts</h2>
                <img src="/assets/images/charts-img.png" alt="Cover" class="card-image" />
            </div>

            <div class="card pink">
                <h2>Trending</h2>
                <img src="/assets/images/trending-img.png" alt="Cover" class="card-image" />
            </div>

            <div class="card lilac">
                <h2>Discover</h2>
                <img src="/assets/images/discover-img.png" alt="Cover" class="card-image" />
            </div>

            <div class="card gray">
                <h2>Spotify<br />Singles</h2>
                <img src="/assets/images/singles-img.png" alt="Cover" class="card-image" />
            </div>

            <div class="card orange">
                <h2>Decades</h2>
                <img src="/assets/images/decades-img.png" alt="Cover" class="card-image" />
            </div>
        </div>

        <div class="browse__header browse__header--genres">
            <p>Genres</p>
        </div>

        <div class="browse__row">
            <div class="card pop">
                <h2>Pop</h2>
                <img src="/assets/images/pop.img" alt="Pop" class="card-image" />
            </div>

            <div class="card country">
                <h2>Country</h2>
                <img src="/assets/images/country-img.png" alt="Country" class="card-image" />
            </div>

            <div class="card hiphop">
                <h2>Hip-Hop</h2>
                <img src="/assets/images/hip-hop-img.png" alt="Hip-Hop" class="card-image" />
            </div>

            <div class="card rock">
                <h2>Rock</h2>
                <img src="/assets/images/rock-img.png" alt="Rock" class="card-image" />
            </div>

            <div class="card indie">
                <h2>Indie</h2>
                <img src="/assets/images/indie.img" alt="Indie" class="card-image" />
            </div>

            <div class="card punk">
                <h2>Punk</h2>
                <img src="/assets/images/punk.img" alt="Punk" class="card-image" />
            </div>

            <div class="card metal">
                <h2>Metal</h2>
                <img src="/assets/images/metal.img" alt="Metal" class="card-image" />
            </div>

            <div class="card instrumental">
                <h2>Instrumental</h2>
                <img src="/assets/images/instrumental.img" alt="Instrumental" class="card-image" />
            </div>
        </div>

    </section>
    </section>
    </section>
</body>

</html>
